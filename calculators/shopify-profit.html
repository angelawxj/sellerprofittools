<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="PayPal Fee Calculator - Calculate net income after PayPal fees.">
<title>PayPal Fee Calculator</title>
<link rel="stylesheet" href="../assets/style.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9625726268537588"
     crossorigin="anonymous"></script>
</head>
<body>
<header>
<h1>PayPal Fee Calculator</h1>
<p>Calculate net income after PayPal fees</p>
<span class="theme-toggle" onclick="toggleTheme()">Switch Theme</span>
</header>
<main>
<h2>Enter Payment Details</h2>
<label for="amount">Payment Amount (USD):</label>
<input type="number" id="amount" placeholder="Enter amount" min="0" step="0.01">
<label for="feeType">Fee Type:</label>
<select id="feeType">
<option value="standard">Standard (2.9% + $0.30)</option>
<option value="micro">Micropayments (5% + $0.05)</option>
</select>
<button onclick="calculateFee()">Calculate</button>
<div class="result" id="result"></div>
</main>
<footer>
&copy; 2026 Seller Profit Tools | <a href="../index.html">Home</a>
</footer>
<script>
function toggleTheme(){document.body.classList.toggle('dark');}
function calculateFee(){
  const amount=parseFloat(document.getElementById('amount').value);
  const feeType=document.getElementById('feeType').value;
  if(isNaN(amount)||amount<=0){document.getElementById('result').textContent="Please enter a valid amount.";return;}
  let net=0;
  if(feeType==="standard"){net=amount-(amount*0.029+0.3);}
  else if(feeType==="micro"){net=amount-(amount*0.05+0.05);}
  document.getElementById('result').textContent=`Net Income: $${net.toFixed(2)}`;
}
</script>
</body>
</html>
