<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="CPM Calculator - Calculate cost per 1000 impressions for advertising.">
<title>CPM Calculator</title>
<link rel="stylesheet" href="../assets/style.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9625726268537588"
     crossorigin="anonymous"></script>
</head>
<body>
<header>
<h1>CPM Calculator</h1>
<p>Calculate cost per 1000 ad impressions</p>
<span class="theme-toggle" onclick="toggleTheme()">Switch Theme</span>
</header>
<main>
<div class="tool-card">
<h2>Input Details</h2>
<label for="cpmCost">Total Ad Cost ($):</label>
<input type="number" id="cpmCost" placeholder="Enter total cost">

<label for="impressions">Number of Impressions:</label>
<input type="number" id="impressions" placeholder="Enter impressions">

<button class="calc-btn" onclick="calculateCPM()">Calculate CPM</button>
<div class="result" id="result"></div>
</div>
</main>
<footer>
&copy; 2026 Seller Profit Tools | <a href="../index.html">Home</a>
</footer>
<script src="../assets/script.js"></script>
<script>
function calculateCPM(){
  const cost = parseFloat(document.getElementById('cpmCost').value) || 0;
  const impressions = parseFloat(document.getElementById('impressions').value) || 0;
  if(impressions === 0){document.getElementById('result').textContent="Impressions must be greater than 0.";return;}
  const cpm = (cost / impressions) * 1000;
  document.getElementById('result').textContent = `CPM: $${cpm.toFixed(2)}`;
}
</script>
</body>
</html>
